<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#f6f6f8" media="(prefers-color-scheme: light)" />
<meta name="theme-color" content="#161618" media="(prefers-color-scheme: dark)" />
<link rel="icon" href="https://api.iconify.design/lucide:zap.svg?color=%23007aff" />
<title>Quasar AI · BYOK Edition</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/appwrite@17/dist/iife/sdk.js"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="layout">

  <!-- Sidebar -->
  <div id="sidebar-backdrop" onclick="closeSidebarMobile()"></div>
  <div id="sidebar">
    <div id="sidebar-header">
      <span>Quasar AI</span>
      <button id="new-chat-btn" onclick="newChat()">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New
      </button>
    </div>
    <!-- User info bar -->
    <div id="user-bar">
      <div id="user-info" style="display:none">
        <div id="user-avatar"></div>
        <span id="user-name"></span>
      </div>
      <button id="auth-btn" onclick="openAuthModal()">Sign in</button>
    </div>
    <div id="chat-list">
      <div id="chat-list-empty">Start a chat</div>
    </div>
    <div id="sidebar-footer">
      <button class="sidebar-action" onclick="openSettingsModal()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        Settings
      </button>
      <button id="sidebar-export-btn" class="sidebar-action" onclick="exportChat()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Export chat
      </button>
      <button class="sidebar-action" onclick="clearAllChats()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        Clear all chats
      </button>
      <button id="logout-btn" class="sidebar-action" onclick="signOut()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Sign out
      </button>
    </div>
  </div>

  <!-- Main -->
  <div id="main">

    <div id="titlebar">
      <button id="toggle-sidebar" onclick="toggleSidebar()" title="Toggle sidebar">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
      </button>
      <span id="chat-title">New Chat</span>
      <button class="titlebar-btn" onclick="openSettingsModal()" title="Settings">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
      <button class="titlebar-btn" id="theme-toggle" onclick="toggleTheme()" title="Toggle dark/light mode">
        <svg id="theme-icon-moon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg id="theme-icon-sun" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      </button>
    </div>

    <div id="stream">
      <div id="empty">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        <h2>Hi, I'm Quasar AI</h2>

        <p>Ask anything or attach files.</p>
        <div id="suggestions">
          <div class="suggestion" onclick="useSuggestion(this)">✍️ Help me write something</div>
          <div class="suggestion" onclick="useSuggestion(this)">🔍 Explain a concept</div>
          <div class="suggestion" onclick="useSuggestion(this)">💻 Help with code</div>
          <div class="suggestion" onclick="useSuggestion(this)">📊 Analyze data</div>
          <div class="suggestion" onclick="useSuggestion(this)">🌐 Summarize a topic</div>
          <div class="suggestion" onclick="useSuggestion(this)">💡 Brainstorm ideas</div>
        </div>
      </div>
    </div>

    <div id="attachments-tray"></div>
    <div id="inputarea">
      <div id="inputarea-inner">
        <div id="inputbar">
          <div id="input-row">
            <button id="mobile-new-chat-btn" onclick="newChat()" title="New chat">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </button>
            <button id="mobile-chats-btn" onclick="toggleSidebar()" title="Chats">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            </button>
            <div id="inputwrap">
              <button class="input-btn" onclick="document.getElementById('file-input').click()" title="Attach file">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
              </button>
              <input type="file" id="file-input" multiple accept="image/*,.pdf,.txt,.md,.csv,.json,.js,.py,.html,.css" />
              <textarea id="input" rows="1" placeholder="Message…" autocomplete="off" spellcheck="true"></textarea>
              <button id="mic-btn" class="input-btn" title="Voice input" onclick="toggleMic()">
                <svg id="mic-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
              </button>
              <button id="send" aria-label="Send" onclick="send()">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
              </button>
            </div>
          </div>
  
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Auth Modal -->
<div id="auth-overlay" onclick="handleAuthOverlayClick(event)">
  <div class="modal" id="auth-modal">
    <h2 id="auth-title">Sign in to Quasar AI</h2>
    <p id="auth-subtitle">Sync your chats across all devices.</p>
    <div id="auth-error" style="display:none;color:var(--red);font-size:12px;margin-bottom:8px;padding:8px 10px;background:rgba(255,69,58,.08);border-radius:6px"></div>
    <div class="modal-field">
      <label>Email</label>
      <input type="email" id="auth-email" placeholder="you@example.com" autocomplete="email"/>
    </div>
    <div class="modal-field">
      <label>Password</label>
      <input type="password" id="auth-password" placeholder="••••••••" autocomplete="current-password"/>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" id="auth-switch-btn" onclick="toggleAuthMode()">Create account</button>
      <button class="btn-primary" id="auth-submit-btn" onclick="submitAuth()">Sign in</button>
    </div>
    <div style="text-align:center;margin-top:10px">
      <button onclick="signInGoogle()" style="display:flex;align-items:center;gap:8px;margin:0 auto;padding:8px 16px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text);font-family:var(--font);font-size:13px;cursor:pointer;transition:background .12s">
        <svg width="16" height="16" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continue with Google
      </button>
    </div>
  </div>
</div>

<!-- Settings Modal -->
<div id="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <h2>Settings</h2>
    <p>Configure your assistant.</p>
    <div class="modal-field">
      <label>API Key</label>
      <div style="display:flex;gap:6px">
        <input type="password" id="api-key-input" placeholder="gsk_… / sk-… / sk-ant-…" autocomplete="off" style="flex:1" />
        <button onclick="fetchModels()" id="fetch-models-btn" style="padding:0 12px;border-radius:8px;border:1px solid var(--border);background:var(--surface-2);color:var(--text);font-family:var(--font);font-size:12px;cursor:pointer;white-space:nowrap;transition:background .12s">Fetch Models</button>
      </div>
      <div id="provider-badge" style="font-size:11px;color:var(--text-sub);margin-top:4px;opacity:.7"></div>
    </div>
    <div class="modal-field" id="model-field">
      <label>Model</label>
      <select id="model-select" style="width:100%;padding:8px 10px;border-radius:8px;border:1px solid var(--input-border);background:var(--input-bg);color:var(--text);font-family:var(--font);font-size:13px;outline:none">
        <option value="">— fetch models first —</option>
      </select>
      <div id="model-status" style="font-size:11px;color:var(--text-sub);margin-top:4px;opacity:.7"></div>
    </div>
    <div class="modal-field">
      <label>System Prompt</label>
      <textarea id="system-prompt-input" rows="3" placeholder="You are a helpful assistant…"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" onclick="saveSettings()">Save</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="app.js"></script>
</body>
</html>
